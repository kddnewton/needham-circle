name: Sync Needham Rotary Club events

on:
  schedule:
    # 08:04 UTC daily — staggered from sync-lwv (07:23), sync-lets-bike (07:37),
    # and sync-needham-gov (07:51).
    - cron: "4 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rake sync:needham_rotary
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          EVENTS_CALENDAR_ID: ${{ secrets.EVENTS_CALENDAR_ID }}

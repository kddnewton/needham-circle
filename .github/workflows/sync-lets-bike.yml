name: Sync Let's Bike Needham events

on:
  schedule:
    # 07:37 UTC daily — offset from sync-lwv (07:23) so they don't queue up
    # on the same scheduler tick.
    - cron: "37 7 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rake sync:lets_bike
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          EVENTS_CALENDAR_ID: ${{ secrets.EVENTS_CALENDAR_ID }}

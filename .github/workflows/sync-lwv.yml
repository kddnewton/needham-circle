name: Sync LWV-Needham events

on:
  schedule:
    # 07:23 UTC daily — ~2:23 AM ET (winter) / 3:23 AM ET (summer).
    # Off the hour to dodge GitHub Actions' on-the-hour queue.
    - cron: "23 7 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rake sync:lwv
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          EVENTS_CALENDAR_ID: ${{ secrets.EVENTS_CALENDAR_ID }}
